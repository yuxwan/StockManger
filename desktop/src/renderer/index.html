<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STOCK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      #loading-overlay {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        background: #fbf9f9 !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        z-index: 99999 !important;
        pointer-events: none !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        box-sizing: border-box !important;
      }
      .dark #loading-overlay {
        background: #1a1a1a !important;
      }
      #loading-overlay .loading-spinner {
        width: 40px !important;
        height: 40px !important;
        border: 3px solid #e3e2e2 !important;
        border-top-color: #1b1c1c !important;
        border-radius: 50% !important;
        animation: spin 0.8s linear infinite !important;
        margin: 0 !important;
        padding: 0 !important;
        box-sizing: border-box !important;
      }
      .dark #loading-overlay .loading-spinner {
        border-color: #333 !important;
        border-top-color: #f2f0f0 !important;
      }
      #loading-overlay .loading-text {
        margin-top: 16px !important;
        font-size: 13px !important;
        color: #7e7576 !important;
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        font-weight: normal !important;
        line-height: 1.4 !important;
        margin-bottom: 0 !important;
        padding: 0 !important;
      }
      .dark #loading-overlay .loading-text {
        color: #999 !important;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-surface dark:bg-[#1a1a1a] text-on-surface dark:text-inverse-on-surface font-body">
    <div id="loading-overlay">
      <div class="loading-spinner"></div>
      <div class="loading-text">加载中...</div>
    </div>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
