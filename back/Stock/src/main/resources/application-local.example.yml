server:
  port: 8080
  tomcat:
    max-threads: 200
    min-spare-threads: 20

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://localhost:3306/stock?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 10000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

sa-token:
  token-name: Authorization
  timeout: -1
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

wx:
  miniapp:
    appid: your_appid
    secret: your_secret

static:
  resource:
    url: https://your-domain.com/static/

logging:
  level:
    com.luckyun.stock: debug
    org.springframework: info
